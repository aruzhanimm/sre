services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: betkz-db
    environment:
      POSTGRES_DB: ${DB_NAME:-betkz}
      POSTGRES_USER: ${DB_USER:-betkz}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-betkz_dev_pass}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-betkz}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - betkz-net

  redis:
    image: redis:7-alpine
    container_name: betkz-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - betkz-net

  # ── Core Backend (Go) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
    container_name: betkz-backend
    ports:
      - "${API_PORT:-8081}:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-betkz}
      DB_PASSWORD: ${DB_PASSWORD:-betkz_dev_pass}
      DB_NAME: ${DB_NAME:-betkz}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 8080
      GIN_MODE: ${GIN_MODE:-release}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - betkz-net

  # ── Microservice 1: Auth Service ───────────────────────────────────────────
  auth-service:
    build:
      context: ../services/auth-service
    container_name: betkz-auth-service
    ports:
      - "8001:8001"
    environment:
      BACKEND_URL: http://backend:8080
      PORT: 8001
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - betkz-net

  # ── Microservice 2: User Service ───────────────────────────────────────────
  user-service:
    build:
      context: ../services/user-service
    container_name: betkz-user-service
    ports:
      - "8002:8002"
    environment:
      BACKEND_URL: http://backend:8080
      PORT: 8002
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - betkz-net

  # ── Microservice 3: Order Service (Incident Simulation target) ─────────────
  order-service:
    build:
      context: ../services/order-service
    container_name: betkz-order-service
    ports:
      - "8003:8003"
    environment:
      BACKEND_URL: http://backend:8080
      PORT: 8003
      INJECT_FAULT: "false"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/health | grep -v FAULT_INJECTED || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - betkz-net

  # ── Microservice 4: Chat Service ───────────────────────────────────────────
  chat-service:
    build:
      context: ../services/chat-service
    container_name: betkz-chat-service
    ports:
      - "8004:8004"
    environment:
      PORT: 8004
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8004/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - betkz-net

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
    container_name: betkz-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - betkz-net

  # ── Monitoring ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: betkz-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - backend
      - auth-service
      - user-service
      - order-service
      - chat-service
    restart: unless-stopped
    networks:
      - betkz-net

  grafana:
    image: grafana/grafana:latest
    container_name: betkz-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - betkz-net

networks:
  betkz-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data: